name: Registry

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # formatting, schema, and build
      - name: Registry check
        run: npm run registry:check

      - name: Unit tests
        run: npm test

      # installs the working-tree bundles into the aligned baseline, resolves real
      # dependencies, type-checks, and verifies idempotence + app-owned contracts.
      - name: Install smoke test
        run: npm run smoke
