name: Registry

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # formatting, schema, and build
      - name: Registry check
        run: npm run registry:check

      - name: Unit tests
        run: npm test

      # installs the working-tree bundles into the aligned baseline, resolves real
      # dependencies, type-checks, and verifies idempotence + app-owned contracts.
      - name: Install smoke test
        run: npm run smoke
